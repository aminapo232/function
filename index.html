<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РО232</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6fa8;
            --primary-dark: #e0528f;
            --primary-light: #ffb3d1;
            --accent: #ff3d7f;
            --bg: #fff0f5;
            --card: #ffffff;
            --text: #4a1a2c;
            --text-muted: #b0607a;
            --border: #ffd6e7;
            --success: #ff6fa8;
            --shadow: rgba(255, 63, 128, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(255, 111, 168, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(255, 61, 127, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        /* Floating blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,111,168,0.08) 0%, transparent 70%);
            top: -80px; right: -80px;
        }
        body::after {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,61,127,0.07) 0%, transparent 70%);
            bottom: -60px; left: -60px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow:
                0 4px 24px var(--shadow),
                0 0 0 1px var(--border);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #app { display: none; width: 100%; max-width: 420px; position: relative; z-index: 1; }

        h2, h3, h4 {
            color: var(--text);
            font-weight: 800;
        }

        h2 { font-size: 1.8em; margin-bottom: 8px; }
        h3 { font-size: 1.2em; }
        h4 { font-size: 1em; margin-bottom: 16px; color: var(--primary-dark); }

        p { color: var(--text-muted); margin-bottom: 16px; font-size: 0.95em; }

        /* === BUTTONS === */
        .btn {
            padding: 13px 20px;
            border: none;
            border-radius: 50px;          /* pill shape */
            cursor: pointer;
            color: white;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95em;
            width: 100%;
            transition: all 0.25s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
            border-radius: inherit;
        }
        .btn:hover::after { background: rgba(255,255,255,0.12); }
        .btn:active { transform: scale(0.97); }

        .btn-google {
            background: linear-gradient(135deg, #ff6fa8, #ff3d7f);
            box-shadow: 0 4px 16px rgba(255,63,127,0.35);
        }
        .btn-google:hover {
            box-shadow: 0 6px 22px rgba(255,63,127,0.45);
            transform: translateY(-1px);
        }

        .btn-study {
            background: linear-gradient(135deg, #ff6fa8, #ff3d7f);
            box-shadow: 0 4px 16px rgba(255,63,127,0.3);
            margin-bottom: 12px;
        }
        .btn-study:hover {
            box-shadow: 0 6px 22px rgba(255,63,127,0.45);
            transform: translateY(-1px);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4d7a, #c0392b);
            box-shadow: 0 4px 16px rgba(192,57,43,0.3);
        }

        .btn-break {
            background: linear-gradient(135deg, #ffb347, #ffcc02);
            color: #4a2a00;
            box-shadow: 0 4px 14px rgba(255,179,71,0.3);
        }
        .btn-break:hover { transform: translateY(-1px); }

        .btn-logout {
            background: linear-gradient(135deg, #d4a0b5, #c08099);
            box-shadow: 0 4px 14px rgba(192,128,153,0.25);
        }
        .btn-logout:hover { transform: translateY(-1px); }

        /* Timer */
        .timer {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6fa8, #ff3d7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 12px 0;
            letter-spacing: -0.5px;
        }

        /* User display */
        #user-display {
            font-size: 1.1em;
            color: var(--text);
            margin-bottom: 4px;
        }
        #user-display::before {
            content: '🌸 ';
        }

        /* Status dot */
        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #e0b0bf;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .status-online {
            background-color: #ff6fa8;
            box-shadow: 0 0 0 3px rgba(255,111,168,0.25);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(255,111,168,0.25); }
            50%       { box-shadow: 0 0 0 5px rgba(255,111,168,0.1); }
        }

        /* Chat */
        #chat {
            height: 180px;
            overflow-y: auto;
            background: #fff5f8;
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border);
            text-align: left;
            font-size: 0.88em;
            color: var(--text);
            line-height: 1.6;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }

        #chat div { padding: 3px 0; border-bottom: 1px solid #ffe0ec; }
        #chat div:last-child { border-bottom: none; }
        #chat b { color: var(--primary-dark); }

        /* User rows */
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid #ffe8f0;
            text-align: left;
        }
        .user-row:last-child { border-bottom: none; }

        .user-row .name-wrap {
            display: flex;
            align-items: center;
            font-weight: 700;
            color: var(--text);
            font-size: 0.95em;
        }

        .user-row .info {
            font-size: 0.78em;
            color: var(--text-muted);
            text-align: right;
        }
        .user-row .info .study-time {
            color: var(--primary);
            font-weight: 700;
        }

        /* Input + Send */
        .chat-send-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 11px 16px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-family: 'Nunito', sans-serif;
            font-size: 0.9em;
            color: var(--text);
            background: #fff8fa;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,111,168,0.15);
        }
        input[type="text"]::placeholder { color: #d4a0b5; }

        .btn-send {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6fa8, #ff3d7f);
            border: none;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(255,63,127,0.35);
            transition: all 0.2s;
            margin-top: 0;
            padding: 0;
            flex-shrink: 0;
        }
        .btn-send:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(255,63,127,0.45);
        }
        .btn-send:active { transform: scale(0.96); }

        /* Grid for 2 buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 4px;
        }

        /* Login card decoration */
        #login-ui::before {
            content: '🌸';
            font-size: 2.5em;
            display: block;
            margin-bottom: 8px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0;
        }
    </style>
</head>
<body>

    <div id="login-ui" class="card">
        <h2>TIS 251 Hub</h2>
        <p>Авторизуйтесь через Google для входа в систему</p>
        <button onclick="login()" class="btn btn-google">🔑 Войти через Google</button>
    </div>

    <div id="app">
        <div class="card">
            <h3 id="user-display">Загрузка...</h3>
            <div class="timer" id="timer-display">⏱ 0 сек.</div>
            <button id="study-btn" onclick="toggleStudy()" class="btn btn-study">📖 Начать учиться</button>
            <div class="btn-grid">
                <button onclick="updateStatus('☕ Перерыв')" class="btn btn-break">☕ Перерыв</button>
                <button onclick="logout()" class="btn btn-logout">👋 Выход</button>
            </div>
        </div>

        <div class="card">
            <h4>👥 Монитор группы</h4>
            <div id="status-list"></div>
        </div>

        <div class="card">
            <h4>💬 Общий чат</h4>
            <div id="chat"></div>
            <div class="chat-send-row">
                <input type="text" id="msg-input" placeholder="Напишите сообщение...">
                <button onclick="sendMsg()" class="btn-send">➤</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://aclksvnlhxryvmkhwlax.supabase.co'; 
        const SB_KEY = 'sb_publishable_5PcgEIZhvrleB5p0HKUomQ_L_arGn1H';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let studyInterval = null;
        let secondsSpent = 0;
        let onlineUsers = {};

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showApp(session.user);
        }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                showApp(session.user);
                if (window.location.hash.includes('access_token')) {
                    window.history.replaceState(null, null, window.location.origin + window.location.pathname);
                }
            } else {
                document.getElementById('login-ui').style.display = 'block';
                document.getElementById('app').style.display = 'none';
            }
        });

        function showApp(user) {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setup(user);
        }

        async function login() { 
            await supabaseClient.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: 'https://aminapo232.github.io/function/' }
            }); 
        }

        async function logout() { 
            await supabaseClient.auth.signOut(); 
            window.location.href = 'https://aminapo232.github.io/function/'; 
        }

        async function setup(user) {
            const name = user.user_metadata.full_name || user.email;
            document.getElementById('user-display').innerText = name;
            
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) {
                await supabaseClient.from('profiles').insert([{ id: user.id, username: name, status: 'В сети' }]);
            }
            
            refresh();
            supabaseClient.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public' }, refresh).subscribe();

            const presenceChannel = supabaseClient.channel('online-room', { config: { presence: { key: user.id } } });
            presenceChannel.on('presence', { event: 'sync' }, () => {
                onlineUsers = presenceChannel.presenceState();
                refresh();
            }).subscribe(async (s) => {
                if (s === 'SUBSCRIBED') await presenceChannel.track({ online_at: new Date().toISOString() });
            });
        }

        function toggleStudy() {
            const btn = document.getElementById('study-btn');
            const display = document.getElementById('timer-display');
            if (!studyInterval) {
                secondsSpent = 0;
                studyInterval = setInterval(() => {
                    secondsSpent++;
                    display.innerText = `⏱ ${secondsSpent} сек.`;
                }, 1000);
                btn.innerText = "⛔ Завершить сессию";
                btn.className = "btn btn-stop";
                updateStatus('📖 Учится');
            } else {
                clearInterval(studyInterval);
                studyInterval = null;
                saveStudyTime(secondsSpent);
                btn.innerText = "📖 Начать учиться";
                btn.className = "btn btn-study";
                display.innerText = "⏱ 0 сек.";
                updateStatus('☕ Закончил');
            }
        }

        async function saveStudyTime(sec) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.from('profiles').select('studyseconds').eq('id', user.id).single();
            const total = (data ? (data.studyseconds || 0) : 0) + sec;
            await supabaseClient.from('profiles').update({ studyseconds: total }).eq('id', user.id);
        }

        async function updateStatus(s) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('profiles').update({ status: s }).eq('id', user.id);
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('messages').insert([{ user_name: user.user_metadata.full_name, text: input.value }]);
            input.value = '';
        }

        async function refresh() {
            const { data: pr } = await supabaseClient.from('profiles').select('*').order('username');
            const list = document.getElementById('status-list');
            if (pr) {
                list.innerHTML = pr.map(p => {
                    const isOnline = onlineUsers[p.id] ? 'status-online' : '';
                    const ts = p.studyseconds || 0;
                    const h = Math.floor(ts/3600), m = Math.floor((ts%3600)/60), s = ts%60;
                    return `
                        <div class="user-row">
                            <div class="name-wrap">
                                <span class="status-dot ${isOnline}"></span>
                                <b>${p.username}</b>
                            </div>
                            <div class="info">
                                ${p.status}<br>
                                <span class="study-time">⏱ ${h}ч ${m}м ${s}с</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            const { data: msgs } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).limit(15);
            const chatDiv = document.getElementById('chat');
            if (msgs) {
                chatDiv.innerHTML = msgs.reverse().map(m => `<div><b>${m.user_name}:</b> ${m.text}</div>`).join('');
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }

        checkSession();
    </script>
</body>
</html>
