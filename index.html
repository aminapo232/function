<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Supabase Google Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:25px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.google{
    background:#4285F4;
    color:white;
}

.logout{
    background:#e53935;
    color:white;
}

.user{
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1>Авторизация</h1>

<button class="google" id="googleLogin">
Войти через Google
</button>

<button class="logout" id="logout">
Выйти
</button>

<div class="user" id="user"></div>

</div>

<script>

const SUPABASE_URL = "https://aclksvnlhxryvmkhwlax.supabase.co"
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjbGtzdm5saHhyeXZta2h3bGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzczMzEsImV4cCI6MjA4ODI1MzMzMX0.R2P3llaRb0TNkSbQxX2R40h8sbq-uJvttsjG2hThVww"

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
)

const googleBtn = document.getElementById("googleLogin")
const logoutBtn = document.getElementById("logout")
const userDiv = document.getElementById("user")


// Вход через Google
googleBtn.addEventListener("click", async () => {

    const { data, error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google"
    })

    if(error){
        alert(error.message)
    }

})


// Проверка пользователя
async function checkUser(){

    const { data: { user } } = await supabaseClient.auth.getUser()

    if(user){

        userDiv.innerHTML = `
        Вы вошли как:<br>
        ${user.email}
        `

    }

}

checkUser()


// Выход
logoutBtn.addEventListener("click", async () => {

    await supabaseClient.auth.signOut()
    location.reload()

})

</script>

</body>
</html>
