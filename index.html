<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Supabase Google Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:25px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

.google{
    background:#4285F4;
    color:white;
}

.logout{
    background:#e53935;
    color:white;
}

.user{
    margin-top:20px;
    font-weight:bold;
    word-break: break-word;
}
</style>

</head>
<body>

<div class="container">
<h1>Авторизация</h1>

<button class="google" id="googleLogin">
Войти через Google
</button>

<button class="logout" id="logout">
Выйти
</button>

<div class="user" id="user"></div>
</div>

<script>
const SUPABASE_URL = "https://aclksvnlhxryvmkhwlax.supabase.co"
const SUPABASE_ANON_KEY = "sb_publishable_5PcgEIZhvrleB5p0HKUomQ_L_arGn1H"

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
)

const googleBtn = document.getElementById("googleLogin")
const logoutBtn = document.getElementById("logout")
const userDiv = document.getElementById("user")

function updateUI(user) {
    if (user) {
        userDiv.innerHTML = `
            Вы вошли как:<br>
            ${user.email}<br>
            <small style="font-size:12px;color:#666;">
                ID: ${user.id.substring(0,8)}...
            </small>
        `
        googleBtn.style.display = "block"
        logoutBtn.style.display = "block"
    } else {
        userDiv.innerHTML = "Вы не авторизованы"
        googleBtn.style.display = "block"
        logoutBtn.style.display = "block"
    }
}

async function checkUser() {
    try {
        const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession()
        
        if (sessionError) {
            console.error("Session error:", sessionError)
            updateUI(null)
            return
        }

        if (session?.user) {
            updateUI(session.user)
        } else {
            updateUI(null)
        }
    } catch (error) {
        console.error("Check user error:", error)
        updateUI(null)
    }
}

async function handleAuthRedirect() {
    try {
        const { data, error } = await supabaseClient.auth.getSession()
        
        if (error) {
            console.error("Auth redirect error:", error)
            return
        }

        const hashParams = new URLSearchParams(window.location.hash.substring(1))
        if (hashParams.get('access_token')) {
            window.location.hash = ''
            await checkUser()
        }
    } catch (error) {
        console.error("Handle redirect error:", error)
    }
}

googleBtn.addEventListener("click", async () => {
    try {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: "google",
            options: {
                redirectTo: window.location.origin + window.location.pathname
            }
        })

        if (error) {
            alert("Ошибка входа: " + error.message)
            console.error("Login error:", error)
        }
    } catch (error) {
        alert("Ошибка при входе: " + error.message)
        console.error("Login error:", error)
    }
})

logoutBtn.addEventListener("click", async () => {
    try {
        const { error } = await supabaseClient.auth.signOut()
        if (error) {
            alert("Ошибка при выходе: " + error.message)
            console.error("Logout error:", error)
        } else {
            updateUI(null)
            window.location.hash = ''
            window.location.reload()
        }
    } catch (error) {
        alert("Ошибка при выходе: " + error.message)
        console.error("Logout error:", error)
    }
})

supabaseClient.auth.onAuthStateChange((event, session) => {
    console.log("Auth event:", event)
    if (event === 'SIGNED_IN' && session?.user) {
        updateUI(session.user)
    } else if (event === 'SIGNED_OUT') {
        updateUI(null)
    }
})

async function init() {
    await handleAuthRedirect()
    await checkUser()
}

init()

console.log("Supabase client initialized")
</script>

</body>
</html>
