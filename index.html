<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIS 251 - Group Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #3ecf8e; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; margin-bottom: 20px; box-sizing: border-box; text-align: center; }
        #app { display: none; width: 100%; max-width: 400px; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 8px; }
        .btn-study { background: #28a745; margin-bottom: 10px; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background-color: #28a745; box-shadow: 0 0 8px #28a745; }
        #chat { height: 180px; overflow-y: auto; background: #f9f9f9; border-radius: 8px; padding: 10px; margin: 10px 0; border: 1px solid #eee; text-align: left; font-size: 0.9em; }
        .timer { font-size: 1.8em; font-weight: bold; color: #1a73e8; margin: 10px 0; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f1f1; text-align: left; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-ui" class="card">
        <h2 style="color: #1a73e8;">TIS 251 Hub</h2>
        <p>Авторизуйтесь через Google для входа в систему.</p>
        <button onclick="login()" class="btn" style="background: #4285F4;">Войти через Google</button>
    </div>

    <div id="app">
        <div class="card">
            <h3 id="user-display">Загрузка...</h3>
            <div class="timer" id="timer-display">⏱️ 0 сек.</div>
            <button id="study-btn" onclick="toggleStudy()" class="btn btn-study">📖 Начать учиться</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="updateStatus('☕ Перерыв')" class="btn" style="background: #ffc107; color: #000;">☕ Перерыв</button>
                <button onclick="logout()" class="btn" style="background: #6c757d;">Выход</button>
            </div>
        </div>

        <div class="card">
            <h4>👥 Монитор группы</h4>
            <div id="status-list"></div>
        </div>

        <div class="card">
            <h4>💬 Общий чат</h4>
            <div id="chat"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button onclick="sendMsg()" class="btn" style="background: var(--primary); width: 60px; margin: 0;">➤</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://rncerhgizyjhovbdpqnl.supabase.co'; 
        const SB_KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFTg_O0HMJ5yh';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let studyInterval = null;
        let secondsSpent = 0;
        let onlineUsers = {};

        // 1. Принудительная проверка сессии при загрузке (решает проблему "зависания")
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                console.log("Сессия найдена!");
                showApp(session.user);
            }
        }

        // 2. Слушатель изменений авторизации
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log("Событие Auth:", event);
            if (session) {
                showApp(session.user);
                // Очистка URL от токена доступа
                if (window.location.hash.includes('access_token')) {
                    window.history.replaceState(null, null, window.location.origin + window.location.pathname);
                }
            } else {
                document.getElementById('login-ui').style.display = 'block';
                document.getElementById('app').style.display = 'none';
            }
        });

        function showApp(user) {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            setup(user);
        }

        async function login() { 
            await supabaseClient.auth.signInWithOAuth({ 
                provider: 'google',
                options: { 
                    redirectTo: 'https://duisenbekalmas.github.io/qazaq/' 
                }
            }); 
        }

        async function logout() { 
            await supabaseClient.auth.signOut(); 
            window.location.href = 'https://duisenbekalmas.github.io/qazaq/'; 
        }

        async function setup(user) {
            const name = user.user_metadata.full_name || user.email;
            document.getElementById('user-display').innerText = name;
            
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if (!profile) {
                await supabaseClient.from('profiles').insert([{ id: user.id, username: name, status: 'В сети' }]);
            }
            
            refresh();
            supabaseClient.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public' }, refresh).subscribe();

            const presenceChannel = supabaseClient.channel('online-room', { config: { presence: { key: user.id } } });
            presenceChannel.on('presence', { event: 'sync' }, () => {
                onlineUsers = presenceChannel.presenceState();
                refresh();
            }).subscribe(async (s) => {
                if (s === 'SUBSCRIBED') await presenceChannel.track({ online_at: new Date().toISOString() });
            });
        }

        // --- Логика таймера и чата ---
        function toggleStudy() {
            const btn = document.getElementById('study-btn');
            const display = document.getElementById('timer-display');
            if (!studyInterval) {
                secondsSpent = 0;
                studyInterval = setInterval(() => {
                    secondsSpent++;
                    display.innerText = `⏱️ ${secondsSpent} сек.`;
                }, 1000);
                btn.innerText = "⛔ Завершить сессию";
                btn.style.background = "#dc3545";
                updateStatus('📖 Учится');
            } else {
                clearInterval(studyInterval);
                studyInterval = null;
                saveStudyTime(secondsSpent);
                btn.innerText = "📖 Начать учиться";
                btn.style.background = "#28a745";
                display.innerText = "⏱️ 0 сек.";
                updateStatus('☕ Закончил');
            }
        }

        async function saveStudyTime(sec) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.from('profiles').select('study_seconds').eq('id', user.id).single();
            const total = (data ? (data.study_seconds || 0) : 0) + sec;
            await supabaseClient.from('profiles').update({ study_seconds: total }).eq('id', user.id);
        }

        async function updateStatus(s) {
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('profiles').update({ status: s }).eq('id', user.id);
        }

        async function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            await supabaseClient.from('messages').insert([{ user_name: user.user_metadata.full_name, text: input.value }]);
            input.value = '';
        }

        async function refresh() {
            const { data: pr } = await supabaseClient.from('profiles').select('*').order('username');
            const list = document.getElementById('status-list');
            if (pr) {
                list.innerHTML = pr.map(p => {
                    const isOnline = onlineUsers[p.id] ? 'status-online' : '';
                    const ts = p.study_seconds || 0;
                    const h = Math.floor(ts/3600), m = Math.floor((ts%3600)/60), s = ts%60;
                    return `
                        <div class="user-row">
                            <span><span class="status-dot ${isOnline}"></span><b>${p.username}</b></span>
                            <span style="font-size: 0.8em; color: #666; text-align: right;">
                                ${p.status} <br> <small style="color: #1a73e8;">⏱ ${h}ч ${m}м ${s}с</small>
                            </span>
                        </div>
                    `;
                }).join('');
            }
            const { data: msgs } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).limit(15);
            const chatDiv = document.getElementById('chat');
            if (msgs) {
                chatDiv.innerHTML = msgs.reverse().map(m => `<div><b>${m.user_name}:</b> ${m.text}</div>`).join('');
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }

        // Запуск проверки при загрузке страницы
        checkSession();
    </script>
</body>
</html>
